name: 🤖 Review Response Bot

on:
  issue_comment:
    types: [created]

# Only one review processing per issue at a time.
concurrency:
  group: review-bot-${{ github.event.issue.number }}
  cancel-in-progress: false

jobs:
  process_review:
    # Trigger only on issues labeled 'review-required' and only for known commands.
    if: |
      contains(github.event.issue.labels.*.name, 'review-required') &&
      (
        startsWith(github.event.comment.body, '/approve') ||
        startsWith(github.event.comment.body, '/reject')  ||
        startsWith(github.event.comment.body, '/modify')
      )
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      issues: write
      actions: read
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install playwright
          python -m playwright install --with-deps chromium

      - name: 🔄 Parse Review Command
        id: parse
        env:
          COMMENT: ${{ github.event.comment.body }}
          COMMENTER: ${{ github.event.comment.user.login }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          python -m src.workers.review_handler \
            --comment "$COMMENT" \
            --commenter "$COMMENTER" \
            --issue "$ISSUE_NUMBER"

      - name: 🎯 Submit Approved Tasks (if any)
        if: success() && steps.parse.outcome == 'success'
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          BROWSER_TYPE: playwright
        run: |
          # Read review_result.json and only proceed if actionable
          ACTION=$(python -c "import json;print(json.load(open('review_result.json')).get('action','noop'))")
          echo "Action: $ACTION"
          if [ "$ACTION" = "submit_all" ] || [ "$ACTION" = "submit_specific" ]; then
            python - <<'PY'
          import json, os, sys, tempfile
          from pathlib import Path
          from src.workers.executor import TaskExecutor

          result = json.loads(Path("review_result.json").read_text())
          tasks = result.get("tasks", [])
          if not tasks:
              print("No tasks to submit.")
              sys.exit(0)
          with tempfile.NamedTemporaryFile("w", suffix=".json", delete=False) as f:
              json.dump(tasks, f)
              tmp = f.name
          ex = TaskExecutor(dry_run=False)
          results = ex.execute_from_file(tmp)
          Path("submission_results.json").write_text(json.dumps(results, indent=2, default=str))
          ok = sum(1 for r in results if r.get("status") in ("completed", "dry_run"))
          print(f"Submitted {ok}/{len(results)} task(s) successfully.")
          PY
          else
            echo "No submission needed for action=$ACTION"
          fi

      - name: 💬 Reply with Result
        if: always()
        uses: actions/github-script@v9
        env:
          SUBMISSION_PATH: submission_results.json
        with:
          script: |
            const fs = require('fs');
            let summary = '';
            try {
              const result = JSON.parse(fs.readFileSync('review_result.json', 'utf8'));
              summary = result.summary || 'Processed (no summary)';
            } catch (e) {
              summary = 'Processed (no result file)';
            }

            let submissionNote = '';
            try {
              if (fs.existsSync(process.env.SUBMISSION_PATH)) {
                const subs = JSON.parse(fs.readFileSync(process.env.SUBMISSION_PATH, 'utf8'));
                if (Array.isArray(subs) && subs.length) {
                  const lines = subs.map(s => {
                    const id = s.task_id || s.id || 'unknown';
                    const st = s.status || 'unknown';
                    const emoji = st === 'completed' ? '✅' : (st === 'failed' ? '❌' : '⏳');
                    return `- ${emoji} \`${id}\` → ${st}`;
                  });
                  submissionNote = `\n\n### 📤 Submission Results\n${lines.join('\n')}`;
                }
              }
            } catch (e) {}

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `**Processed @${context.payload.comment.user.login}**\n\n${summary}${submissionNote}`
            });

      - name: 🏁 Close Issue when nothing pending
        if: success()
        uses: actions/github-script@v9
        with:
          script: |
            const result = JSON.parse(require('fs').readFileSync('review_result.json', 'utf8'));
            const actionable = result.action && result.action.startsWith('submit');
            if (actionable) {
              // Close after submission so the dashboard doesn't fill up.
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                state: 'closed'
              });
            }
